<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aashapura Shift Mesh & Moisture Log</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/navbar_logo.png" type="image/png">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

<!-- Background -->
<div class="background">
  <div class="grid-lines"></div>
  <div class="glow-orb glow-1"></div>
  <div class="glow-orb glow-2"></div>
</div>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-container">
    <div class="logo-section">
      <img src="assets/navbar_logo.png" alt="Company Logo" class="company-logo" onerror="this.style.display='none'">
      <span class="brand">Aashapura International Ltd.</span>
    </div>

    <div class="nav-right">
      <span id="userInfo" class="user-info"></span>
      <button id="logoutBtn" class="btn-logout" onclick="logout()" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Logout
      </button>
    </div>
  </div>
</nav>

<!-- Login Screen -->
<main class="main-content">
  <div id="loginBox">
    <div class="login-glow"></div>
    
    <div class="login-icon-wrapper">
      <div class="login-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
    </div>

    <h1 class="login-title">Welcome Back</h1>
    <p class="login-subtitle">Sign in to access your production dashboard</p>

    <div id="g_id_onload"
         data-client_id="124145597750-rt96b3ggard2b3vf07nnqhl2m9n0m83l.apps.googleusercontent.com"
         data-callback="handleCredential"
         data-auto_prompt="false">
    </div>

    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="sign_in_with"
         data-shape="pill">
    </div>

    <div class="login-footer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
      <span>Secure authentication powered by Google</span>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="app-container" style="display:none;">
    <div class="form-card">
      <div class="card-shimmer"></div>
      
      <div class="card-header">
        <div class="header-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
          </svg>
        </div>
        <div class="subtitle">QC Lab Hamla</div>
        <h2>Shift Mesh & Moisture</h2>
      </div>

      <div class="card-body">
        <div class="form-group">
          <div id="machineSelectPage">
            <label class="form-label">Select Mills</label>

            <div class="checkbox-group">
              <label><input type="checkbox" value="Mill 1"> Mill 1</label>
              <label><input type="checkbox" value="Mill 2"> Mill 2</label>
              <label><input type="checkbox" value="Mill 3"> Mill 3</label>
              <label><input type="checkbox" value="Mill 4"> Mill 4</label>
              <label><input type="checkbox" value="Mill 5"> Mill 5</label>
            </div>

            <button onclick="startEntry()" class="btn-submit">
              <span>Next</span>
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="currentMachineTitle"></div>

        <div id="fields" class="fields-container hidden">
          <button type="button" class="btn-back" onclick="goBack()">
            ← Back
          </button>
          <div class="form-group">
            <label for="grade" class="form-label">
              <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
              </svg>
              Grade
            </label>
            <div class="input-wrapper">
              <select id="grade" class="form-select">
                <option value="">-- Select grade --</option>
                <option>Ultra Bond</option>
                <option>Verso Bond</option>
                <option>Ultramax</option>
                <option>Hi-Bent</option>
                <option>UB (High MBA)</option>
                <option>Pilogel</option>
                <option>IOP30</option>
                <option>IOP (High FSV)</option>
                <option>IOP32</option>
                <option>High Bond</option>
              </select>
              <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label for="mesh" class="form-label">
              <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>
              </svg>
              Mesh
            </label>
            <div class="input-wrapper">
              <div class="percent-field">
                <input
                  id="mesh"
                  type="number"
                  inputmode="numeric"
                  placeholder="e.g. 15">
                <span>%</span>
              </div>
            </div>
          </div>

          <div class="form-group input-percent">
            <label for="moisture" class="form-label">
              <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
              </svg>
              Moisture
              <span class="optional-tag">Optional</span>
            </label>
            <div class="input-wrapper">
               <div class="percent-field">
                <input
                  id="moisture"
                  type="number"
                  inputmode="numeric"
                  placeholder="Leave blank if not applicable">
                <span>%</span>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="remarks" class="form-label">
              <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/>
              </svg>
              Remarks
              <span class="optional-tag">Optional</span>
            </label>
            <div class="input-wrapper">
              <input type="text" id="remarks" class="form-input" placeholder="Any additional comments">
            </div>
          </div>

          <button id="submitBtn" class="btn-submit" onclick="submitData()">
            <span id="submitBtnText" class="btn-text">Next</span>
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

</main>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay">
  <div class="loader"></div>
  <p>Submitting...</p>
</div>

<script src="app.js"></script>

</body>
</html>
